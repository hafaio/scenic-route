name: build

on:
  push:
  pull_request:
  workflow_call:
    inputs:
      upload-pages:
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: bun install --frozen-lockfile
      - run: bun lint
      - run: bun test src
      # The tile render + static export is expensive (the shade pyramid alone is ~20 min) and its
      # output is only consumed by the Pages deploy, so it runs only on that path. A push or PR stops
      # at lint + tests.
      - if: inputs.upload-pages
        uses: actions/configure-pages@v6
        with:
          static_site_generator: next
      - if: inputs.upload-pages
        uses: actions/cache@v6
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-
      # The derived tiles/graph (public/**), keyed on the tiler's inputs. On a hit, build-street-tiles'
      # content-hash freshness check recognizes them as current and skips the ~20-min render; on a miss
      # (any data/tiler/script change) it rebuilds and this saves the new set. The freshness check is the
      # correctness net, so the key only needs to be a good hit heuristic, not exhaustive.
      - if: inputs.upload-pages
        uses: actions/cache@v6
        with:
          path: |
            public/tiles
            public/routing
            public/streets
            public/commercial
            public/commercial-lines
            public/trees
            public/landmarks
            public/art
            public/ferries
            public/highways
            public/dining
            public/openstreets
            public/landuse
          key: tiles-${{ hashFiles('data/**', 'crates/tiler/**', 'scripts/*.ts', 'src/tree-cover/manifest.json', 'src/tree-cover/ramp.ts', 'src/tree-cover/genus.ts', 'Cargo.toml', 'Cargo.lock') }}
      - if: inputs.upload-pages
        run: bun export
      - if: inputs.upload-pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

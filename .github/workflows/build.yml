name: build

on:
  push:
  pull_request:
  workflow_call:
    inputs:
      upload-pages:
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: bun install --frozen-lockfile
      - run: bun lint
      - run: bun test src
      # The tile render + static export is expensive (the shade pyramid alone is ~20 min) and its
      # output is only consumed by the Pages deploy, so it runs only on that path. A push or PR stops
      # at lint + tests.
      - if: inputs.upload-pages
        uses: actions/configure-pages@v6
        with:
          static_site_generator: next
      - if: inputs.upload-pages
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('bun.lock') }}-
      - if: inputs.upload-pages
        run: bun export
      - if: inputs.upload-pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
